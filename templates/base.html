<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Readfolio{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    {% block head %}{% endblock %}

    <style>
        /* CSS UNTUK WELCOME OVERLAY */
        #welcome-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        #welcome-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #welcome-text {
            text-align: center;
            font-family: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
            font-style: italic;
            font-weight: 300;
            color: #fff;
            line-height: 1.5;
            letter-spacing: 0.03em;
            animation: welcome-rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        #welcome-text .line1 { display: block; font-size: clamp(18px, 3.5vw, 28px); color: rgba(255,255,255,0.72); margin-bottom: 6px; }
        #welcome-text .line2 { display: block; font-size: clamp(28px, 6vw, 52px); color: #fff; text-shadow: 0 2px 40px rgba(255,220,140,0.35); }
        #welcome-text .line3 { display: block; font-size: clamp(22px, 4vw, 34px); color: rgba(255,200,180,0.90); margin-top: 4px; }
        @keyframes welcome-rise {
            from { transform: translateY(18px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="welcome-overlay" hidden>
      <div id="welcome-text"></div>
    </div>

    {% block body %}{% endblock %}

    <div id="toast-container"></div>

    {% block flash_toasts %}
    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            // Hanya menggunakan class murni dari main.css agar tema konsisten
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div style="flex: 1;">${message}</div>
                <button onclick="this.parentElement.style.animation = 'toast-out 0.3s forwards'; setTimeout(() => this.parentElement.remove(), 300)" 
                        style="background:none; border:none; color:inherit; font-size:18px; cursor:pointer; padding:0 4px; line-height:1; margin-left: 10px;">
                    &times;
                </button>
            `;

            container.appendChild(toast);

            // Hilang otomatis setelah 4 detik
            setTimeout(() => {
                if(toast.parentElement) {
                    toast.style.animation = 'toast-out 0.3s forwards';
                    setTimeout(() => { toast.remove(); }, 300);
                }
            }, 4000);
        }

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            window.addEventListener('load', () => {
              {% for category, message in messages %}
                {% if not message.startswith('welcome_beloved:') %}
                  showToast("{{ message }}", "{{ 'success' if category == 'success' else 'error' if category == 'error' else 'warning' }}");
                {% endif %}
              {% endfor %}
            });
          {% endif %}
        {% endwith %}
    </script>
    {% endblock %}
    
    {% block scripts %}{% endblock %}
</body>
</html>
